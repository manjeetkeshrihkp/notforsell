<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to Google...</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC5uoITdl5gXDxvvtW60mlRWbEjLejxgRM",
      authDomain: "ceninasia.firebaseapp.com",
      projectId: "ceninasia",
      storageBucket: "ceninasia.firebasestorage.app",
      messagingSenderId: "234745308370",
      appId: "1:234745308370:web:77a89729fa6d829d37390b"
    };

    const STORAGE_KEY = 'cenin_bridge_redirect_uri';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');
    provider.setCustomParameters({ prompt: 'select_account' });

    async function handleAuth() {
      // -----------------------------------------------------------------------
      // STEP 1: Check if we are RETURNING from Google OAuth redirect
      //         getRedirectResult() resolves with null when there is no pending
      //         redirect, and with the user object when Google sent us back.
      // -----------------------------------------------------------------------
      let redirectResult = null;
      try {
        redirectResult = await getRedirectResult(auth);
      } catch (error) {
        console.error("getRedirectResult failed:", error);
        // Retrieve the saved origin so we can send the user back with an error
        const savedUri = sessionStorage.getItem(STORAGE_KEY);
        sessionStorage.removeItem(STORAGE_KEY);
        if (savedUri) {
          try {
            const targetUrl = new URL(savedUri);
            targetUrl.searchParams.set('google_auth_error', error.message || 'redirect_result_failed');
            window.location.replace(targetUrl.toString());
          } catch (_) {
            showError(error.message);
          }
        } else {
          showError(error.message);
        }
        return;
      }

      if (redirectResult && redirectResult.user) {
        // We have a signed-in user — send the ID token back to the origin page
        const savedUri = sessionStorage.getItem(STORAGE_KEY);
        sessionStorage.removeItem(STORAGE_KEY);

        if (!savedUri) {
          showError('Missing return URL. Please go back and try again.');
          return;
        }

        try {
          // user.getIdToken() is always reliable; credential can be null.
          const idToken = await redirectResult.user.getIdToken();

          // Also grab the OAuth access token from the credential (optional).
          let accessToken = null;
          try {
            const credential = GoogleAuthProvider.credentialFromResult(redirectResult);
            if (credential) accessToken = credential.accessToken;
          } catch (_) { /* non-fatal */ }

          const targetUrl = new URL(savedUri);
          targetUrl.searchParams.set('google_id_token', idToken);
          if (accessToken) {
            targetUrl.searchParams.set('google_access_token', accessToken);
          }

          window.location.replace(targetUrl.toString());
        } catch (error) {
          console.error("Failed to get ID token:", error);
          try {
            const targetUrl = new URL(savedUri);
            targetUrl.searchParams.set('google_auth_error', error.message || 'id_token_failed');
            window.location.replace(targetUrl.toString());
          } catch (_) {
            showError(error.message);
          }
        }
        return;
      }

      // -----------------------------------------------------------------------
      // STEP 2: No pending redirect result → this is a FRESH sign-in attempt.
      //         Read the ?redirect= param from the URL, save it, then kick off
      //         the Google OAuth redirect.
      // -----------------------------------------------------------------------
      const urlParams = new URLSearchParams(window.location.search);
      const redirectUri = urlParams.get('redirect');

      if (!redirectUri) {
        showError('Missing redirect URI. Please return to the website and try again.');
        return;
      }

      // Persist the return URL across the OAuth round-trip
      sessionStorage.setItem(STORAGE_KEY, redirectUri);

      try {
        await signInWithRedirect(auth, provider);
      } catch (error) {
        console.error("signInWithRedirect failed:", error);
        sessionStorage.removeItem(STORAGE_KEY);
        showError(error.message);
      }
    }

    function showError(msg) {
      document.getElementById('status-text').textContent = 'Sign-in failed';
      document.getElementById('status-sub').textContent = msg || 'An unknown error occurred.';
      document.getElementById('spinner').style.display = 'none';
    }

    handleAuth();
  </script>
</head>
<body style="background: #09090B; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
  <div style="text-align: center; padding: 2rem;">
    <div id="spinner" style="width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #EAB308; border-radius: 50%; animation: spin 1s cubic-bezier(0.16, 1, 0.3, 1) infinite; margin: 0 auto 1.5rem;"></div>
    <div id="status-text" style="font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.5rem;">Connecting to Google</div>
    <div id="status-sub" style="color: #A1A1AA; font-size: 0.85rem;">Completing secure verification...</div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>
</body>
</html>
