<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to Google...</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC5uoITdl5gXDxvvtW60mlRWbEjLejxgRM",
      authDomain: "ceninasia.firebaseapp.com",
      projectId: "ceninasia",
      storageBucket: "ceninasia.firebasestorage.app",
      messagingSenderId: "234745308370",
      appId: "1:234745308370:web:77a89729fa6d829d37390b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    async function handleAuth() {
      const urlParams = new URLSearchParams(window.location.search);
      const redirectUri = urlParams.get('redirect');

      if (!redirectUri) {
        document.body.innerHTML = "<div style='text-align: center; padding: 2rem;'><h3>Error: Missing redirect URI</h3><p>Please return to the original website and try again.</p></div>";
        return;
      }

      try {
        // Check if we are returning from Google OAuth redirect
        const result = await getRedirectResult(auth);
        if (result?.user) {
          const credential = GoogleAuthProvider.credentialFromResult(result);
          const idToken = credential.idToken;
          const accessToken = credential.accessToken;
          
          // Construct the redirect URL back to the main site with the tokens
          const targetUrl = new URL(redirectUri);
          targetUrl.searchParams.set('google_id_token', idToken);
          if (accessToken) {
            targetUrl.searchParams.set('google_access_token', accessToken);
          }
          
          window.location.replace(targetUrl.toString());
          return;
        }
      } catch (error) {
        console.error("Redirect result processing failed:", error);
        const targetUrl = new URL(redirectUri);
        targetUrl.searchParams.set('google_auth_error', error.message);
        window.location.replace(targetUrl.toString());
        return;
      }

      // If no user is logged in, initiate the redirect to Google
      try {
        await signInWithRedirect(auth, provider);
      } catch (error) {
        console.error("Initiating redirect failed:", error);
        document.body.innerHTML = "<div style='text-align: center; padding: 2rem;'><h3>Sign-in failed</h3><p>" + error.message + "</p></div>";
      }
    }

    // Run the handler
    handleAuth();
  </script>
</head>
<body style="background: #09090B; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
  <div style="text-align: center; padding: 2rem;">
    <div style="width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.08); border-top-color: #EAB308; border-radius: 50%; animation: spin 1s cubic-bezier(0.16, 1, 0.3, 1) infinite; margin: 0 auto 1.5rem;"></div>
    <div style="font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.5rem;">Connecting to Google</div>
    <div style="color: #A1A1AA; font-size: 0.85rem;">Completing secure verification...</div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>
</body>
</html>
