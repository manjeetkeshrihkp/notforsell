<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authenticating | CENIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --accent: #EAB308;
            --border-color: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { 
            background: var(--bg-primary); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        .auth-container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 2.5rem;
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
            display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .status-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .status-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .fallback-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 1.5rem;
            background: var(--text-main);
            color: var(--bg-primary);
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }
        .fallback-btn:active { transform: scale(0.98); }
        #debugLog {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #ef4444;
            text-align: left;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            display: none;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">CENIN</div>
        <div class="spinner" id="spinner" style="display: block;"></div>
        <div class="status-title" id="statusTitle">Authenticating...</div>
        <p class="status-text" id="statusText">Please wait while we check your login status.</p>
        <button class="fallback-btn" id="fallbackBtn" onclick="manualSignIn()" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Sign in with Google
        </button>
        <div id="debugLog"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult,
                 GoogleAuthProvider, onAuthStateChanged, setPersistence,
                 browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // ─── CONFIG ───────────────────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyC5uoITdl5gXDxvvtW60mlRWbEjLejxgRM",
            authDomain: "ceninasia.firebaseapp.com",          // ← YOUR real domain, NOT firebaseapp.com
            projectId: "ceninasia",
            storageBucket: "ceninasia.firebasestorage.app",
            messagingSenderId: "234745308370",
            appId: "1:234745308370:web:77a89729fa6d829d37390b"
        };
        // ─────────────────────────────────────────────────────────────────────

        const app      = initializeApp(firebaseConfig);
        const auth     = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        const statusTitle = document.getElementById('statusTitle');
        const statusText  = document.getElementById('statusText');
        const spinner     = document.getElementById('spinner');
        const fallbackBtn = document.getElementById('fallbackBtn');
        const debugLog    = document.getElementById('debugLog');

        const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

        // ── Always mark that a redirect is in progress so we never show the
        //    sign-in button on the return trip before getRedirectResult resolves.
        const REDIRECT_KEY = 'cenin_redirect_pending';

        function log(msg) {
            console.log('[CENIN]', msg);
            debugLog.style.display = 'block';
            debugLog.innerHTML += msg + "<br>";
        }

        function redirectToApp() {
            const returnUrl = localStorage.getItem('cenin_return_url') || 'index.html';
            window.location.href = returnUrl;
        }

        function showSignInButton() {
            localStorage.removeItem(REDIRECT_KEY);
            spinner.style.display   = 'none';
            fallbackBtn.style.display = 'flex';
            statusTitle.innerText   = 'Sign In Required';
            statusText.innerText    = 'Tap the button below to sign in with Google.';
        }

        // ── Button handler ────────────────────────────────────────────────────
        window.manualSignIn = async function () {
            spinner.style.display   = 'block';
            fallbackBtn.style.display = 'none';

            if (isMobile) {
                statusTitle.innerText = 'Redirecting to Google...';
                statusText.innerText  = 'You\'ll be brought back here after signing in.';
                // Flag so the next page load knows to wait for getRedirectResult
                localStorage.setItem(REDIRECT_KEY, '1');
                try {
                    await signInWithRedirect(auth, provider);
                    // page navigates away — nothing below runs
                } catch (err) {
                    localStorage.removeItem(REDIRECT_KEY);
                    log('Redirect start failed: ' + err.code);
                    showSignInButton();
                }
            } else {
                statusTitle.innerText = 'Opening Google sign-in...';
                statusText.innerText  = 'Complete sign-in in the popup window.';
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (result?.user) {
                        statusTitle.innerText = 'Success!';
                        statusText.innerText  = 'Redirecting you to the app...';
                        redirectToApp();
                    }
                } catch (err) {
                    log('Popup error: ' + err.code);
                    if (err.code === 'auth/popup-closed-by-user') {
                        statusTitle.innerText = 'Sign In Cancelled';
                        statusText.innerText  = 'You closed the Google window. Try again below.';
                    } else {
                        statusTitle.innerText = 'Sign In Failed';
                        statusText.innerText  = err.message;
                    }
                    showSignInButton();
                }
            }
        };

        // ── Main boot logic ───────────────────────────────────────────────────
        async function processAuth() {
            await setPersistence(auth, browserLocalPersistence);

            const redirectPending = localStorage.getItem(REDIRECT_KEY) === '1';

            // STEP 1 — Always call getRedirectResult on every load.
            // On a fresh load with no pending redirect it resolves null quickly.
            // On the return trip from Google it resolves with the user.
            try {
                log('Checking redirect result...');
                const result = await getRedirectResult(auth);

                if (result?.user) {
                    // ✅ Successful redirect return
                    log('Redirect result: user = ' + result.user.email);
                    localStorage.removeItem(REDIRECT_KEY);
                    statusTitle.innerText = 'Success!';
                    statusText.innerText  = 'Redirecting you to the app...';
                    redirectToApp();
                    return;
                }

                log('No redirect result.');
            } catch (err) {
                log('getRedirectResult error: ' + err.code + ' | ' + err.message);
                localStorage.removeItem(REDIRECT_KEY);
                // Fall through — let onAuthStateChanged decide what to show
            }

            // STEP 2 — If we just came back from a redirect but got no result,
            // the mobile browser blocked the cookie (ITP/cross-origin issue).
            // onAuthStateChanged will still fire with the user if the session
            // was saved. Give it a moment to resolve before showing the button.
            if (redirectPending) {
                log('Redirect was pending — waiting for onAuthStateChanged...');
            }

            // STEP 3 — onAuthStateChanged is the final authority.
            // It fires once quickly with either a user or null.
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    log('onAuthStateChanged: user = ' + user.email);
                    localStorage.removeItem(REDIRECT_KEY);
                    statusTitle.innerText = 'Authenticated!';
                    statusText.innerText  = 'Redirecting you to the app...';
                    spinner.style.display = 'block';
                    fallbackBtn.style.display = 'none';
                    redirectToApp();
                } else {
                    log('onAuthStateChanged: no user.');
                    showSignInButton();
                }
            });
        }

        processAuth();
    </script>
</body>
</html>
