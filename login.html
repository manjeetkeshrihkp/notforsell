<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL FIX 1: Viewport meta tag prevents mobile zooming and ensures the button is properly scaled/clickable -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authenticating | CENIN</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f7f6;
            color: #333;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 16px; }
        
        /* CRITICAL FIX 2: Ensures the Google button has a high z-index 
           so it doesn't get "blocked" by invisible mobile UI elements or sticky footers */
        #g_id_onload, .g_id_signin {
            position: relative;
            z-index: 9999;
            margin-top: 30px;
            display: inline-block; 
        }
    </style>
</head>
<body>

    <h1>CENIN</h1>
    <h3 id="status-text">Authenticating...</h3>
    <p id="status-sub">Please wait while we check your login status.</p>

    <!-- 1. Load the modern Google Identity Services library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- 2. Configure the Sign-In settings -->
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCeninSignIn"
         data-auto_prompt="false">
    </div>

    <!-- 3. Render the actual "Sign in with Google" button -->
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large">
    </div>

    <script>
        function handleCeninSignIn(response) {
            if (response.credential) {
                // SUCCESS! The user signed in.
                console.log("Success! Token received:", response.credential);
                
                // Update the UI
                document.getElementById('status-text').innerText = "Login Successful!";
                document.getElementById('status-sub').innerText = "Redirecting to dashboard...";

                // TODO: Send this token to your backend server to verify it and create a session.
                // Example:
                /*
                fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        window.location.href = '/dashboard';
                    }
                });
                */
            } else {
                console.error("Sign-in failed or was closed by user.");
                document.getElementById('status-sub').innerText = "Sign-in failed. Please try again.";
            }
        }
    </script>
</body>
</html>
