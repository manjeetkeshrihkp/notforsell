<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authenticating | CENIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Load Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --accent: #EAB308;
            --border-color: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { 
            background: var(--bg-primary); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        .auth-container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 2.5rem;
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
            display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .status-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .status-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        /* Container for the native Google button */
        #googleButtonContainer {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
            width: 100%;
        }
        #debugLog {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #ef4444;
            text-align: left;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            display: none;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">CENIN</div>
        <div class="spinner" id="spinner" style="display: block;"></div>
        <div class="status-title" id="statusTitle">Authenticating...</div>
        <p class="status-text" id="statusText">Please wait while we check your login status.</p>
        
        <!-- Google Native Button will render here -->
        <div id="googleButtonContainer" style="display: none;"></div>
        
        <div id="debugLog"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Import signInWithCredential for Google Identity Services integration
        import { getAuth, signInWithCredential, GoogleAuthProvider, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5uoITdl5gXDxvvtW60mlRWbEjLejxgRM",
            authDomain: "ceninasia.firebaseapp.com", // Restored to default Firebase domain
            projectId: "ceninasia",
            storageBucket: "ceninasia.firebasestorage.app",
            messagingSenderId: "234745308370",
            appId: "1:234745308370:web:77a89729fa6d829d37390b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const statusTitle = document.getElementById('statusTitle');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const googleButtonContainer = document.getElementById('googleButtonContainer');
        const debugLog = document.getElementById('debugLog');

        function logError(msg) {
            debugLog.style.display = 'block';
            debugLog.innerHTML += msg + "<br>";
        }

        let isHandling = false;

        function handleSuccessRedirect() {
            if (isHandling) return;
            isHandling = true;
            spinner.style.display = 'block';
            googleButtonContainer.style.display = 'none';
            statusTitle.innerText = "Success!";
            statusText.innerText = "Redirecting you back to the app...";
            
            let returnUrl = localStorage.getItem('cenin_return_url') || 'index.html';
            if (returnUrl.includes('login.html')) {
                returnUrl = 'index.html';
            }
            setTimeout(() => { window.location.href = returnUrl; }, 500);
        }

        function resetUI(errorMsg) {
            spinner.style.display = 'none';
            googleButtonContainer.style.display = 'flex';
            statusTitle.innerText = "Sign In Required";
            if (errorMsg) {
                statusText.innerText = errorMsg;
            } else {
                statusText.innerText = "Tap the button below to sign in securely.";
            }
        }

        // Google Identity Services passes the token here directly
        window.handleGoogleResponse = async function(response) {
            spinner.style.display = 'block';
            googleButtonContainer.style.display = 'none';
            statusTitle.innerText = "Connecting...";
            statusText.innerText = "Verifying with Google...";

            try {
                // Force permanent storage
                await setPersistence(auth, browserLocalPersistence);
                
                // Build a Firebase credential using the raw Google JWT token
                const credential = GoogleAuthProvider.credential(response.credential);
                
                // Sign into Firebase silently
                const result = await signInWithCredential(auth, credential);
                if (result && result.user) {
                    handleSuccessRedirect();
                }
            } catch (error) {
                console.error("Firebase Auth Error:", error);
                logError(error.code + " - " + error.message);
                resetUI("Sign in failed. Please try again.");
            }
        };

        function initializeGoogleSignIn() {
            // Initialize Google's native library
            google.accounts.id.initialize({
                client_id: "234745308370-r4r8tn6scafgd1dkljk4mnip248mde2s.apps.googleusercontent.com", 
                callback: handleGoogleResponse
            });

            // Render Google's native button to match your dark theme
            google.accounts.id.renderButton(
                document.getElementById("googleButtonContainer"),
                { theme: "filled_black", size: "large", width: "300", text: "continue_with" }
            );
        }

        function processAuth() {
            spinner.style.display = 'block';
            googleButtonContainer.style.display = 'none';
            statusTitle.innerText = "Checking authentication...";
            statusText.innerText = "Please wait.";

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    handleSuccessRedirect();
                } else {
                    resetUI();
                    // Load the Google button only if the user is not logged in
                    if (typeof google !== 'undefined') {
                        initializeGoogleSignIn();
                    } else {
                        // Fallback in case Google script loads slowly
                        window.addEventListener('load', initializeGoogleSignIn);
                    }
                }
            });
        }

        processAuth();
    </script>
</body>
</html>
